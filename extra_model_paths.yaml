# Aponta o ComfyUI pros modelos que vivem no NETWORK VOLUME (nao mais bakeados).
# No serverless o volume monta em /runpod-volume. O ComfyUI busca AQUI + na pasta
# padrao /ComfyUI/models (que fica vazia). Estrutura esperada no volume:
#   /runpod-volume/wan_models/diffusion_models/  -> High + Low (+ Dasiwa no futuro)
#   /runpod-volume/wan_models/text_encoders/     -> umt5-xxl-enc-bf16
#   /runpod-volume/wan_models/clip_vision/       -> clip_vision_h
#   /runpod-volume/wan_models/vae/               -> Wan2_1_VAE_bf16
#   /runpod-volume/wan_models/loras/             -> LoRAs Lightning + suas LoRAs
wan_volume:
    base_path: /runpod-volume/wan_models/
    diffusion_models: diffusion_models
    text_encoders: text_encoders
    clip_vision: clip_vision
    vae: vae
    loras: loras
