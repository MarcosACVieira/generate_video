name: Build and push worker image

# Builda a imagem LEVE do fork (sem os 40GB de modelo) no GitHub e publica no
# GitHub Container Registry (ghcr.io). Depois e' so apontar o endpoint do RunPod
# em "Deploy from a Docker image" pra essa imagem, com o network volume anexado.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # Base blackwell + ComfyUI + nos passam de 14GB; libera espaco no runner.
      - name: Liberar espaco em disco
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          docker-images: false
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/marcosacvieira/generate_video:latest
